networks:
  default:
    name: kai-network

services:
  kai-doc-pwa:
    build: .
    container_name: kai-doc-pwa
    restart: unless-stopped
    ports:
      - "80:3001"
    volumes:
      - /home/kai/.openclaw/workspace:/workspace:rw
    environment:
      - WORKSPACE_ROOT=/workspace
      - JWT_SECRET=kai-doc-pwa-secret-2026
      - AUTH_USER=guille
      - AUTH_PASS=erythia2026
      - PORT=3001
